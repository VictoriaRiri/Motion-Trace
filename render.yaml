services:
  - type: web
    name: motion-trace
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: YOLO_MODEL
        value: opencv-hog
      - key: TARGET_FPS
        value: "8"
      - key: MAX_ANALYSIS_FRAMES
        value: "360"
